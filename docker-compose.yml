services:
  backend-api:
    build:
      context: .
      dockerfile: DisSagligiTakipApp.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend-ui:
    build:
      context: ./sakai-react-master/sakai-react-master
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend-api